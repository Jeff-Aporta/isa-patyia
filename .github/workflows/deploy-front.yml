# ISA PatyIA — despliegue dual:
#   main → GitHub Pages (producción)
#   dev  → Cloudflare Pages (pruebas)
name: Deploy ISA PatyIA front

on:
  push:
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      target:
        description: "Forzar destino (auto = según rama)"
        required: false
        default: auto
        type: choice
        options:
          - auto
          - github-pages
          - cloudflare-dev

permissions:
  contents: read
  pages: write
  id-token: write
  deployments: write

concurrency:
  group: deploy-front-${{ github.ref }}
  cancel-in-progress: true

jobs:
  github-pages:
    if: >-
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'github-pages')
      || (github.event_name != 'workflow_dispatch' && github.ref == 'refs/heads/main')
      || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'auto' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Verificar artefacto _dist
        run: |
          test -f index.html || (echo "::error::Falta index.html" && exit 1)
          test -d _dist/js/boot || (echo "::error::Falta _dist — ejecutar gen-front-dist.mjs antes del push" && exit 1)

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4

  cloudflare-dev:
    if: >-
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'cloudflare-dev')
      || (github.event_name != 'workflow_dispatch' && github.ref == 'refs/heads/dev')
      || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'auto' && github.ref == 'refs/heads/dev')
    runs-on: ubuntu-latest
    environment:
      name: cloudflare-pages-dev
      url: https://isa-patyia-dev.pages.dev/
    steps:
      - uses: actions/checkout@v4

      - name: Verificar secretos Cloudflare
        run: |
          missing=""
          [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] && missing="$missing CLOUDFLARE_API_TOKEN"
          [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ] && missing="$missing CLOUDFLARE_ACCOUNT_ID"
          if [ -n "$missing" ]; then
            echo "::error::Faltan secretos en isa-patyia:$missing"
            echo "Ejecutar: frontend/scripts/setup-github-secrets.ps1"
            exit 1
          fi

      - name: Verificar token Cloudflare
        run: |
          code=$(curl -sS -o /tmp/cf-verify.json -w "%{http_code}" \
            "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")
          if [ "$code" != "200" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN inválido (HTTP $code)."
            cat /tmp/cf-verify.json || true
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Verificar artefacto _dist
        run: |
          test -f index.html || (echo "::error::Falta index.html" && exit 1)
          test -d _dist/js/boot || (echo "::error::Falta _dist — ejecutar gen-front-dist.mjs antes del push" && exit 1)

      - name: Publicar en Cloudflare Pages (dev)
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: isa-patyia-dev
          directory: .
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: dev
